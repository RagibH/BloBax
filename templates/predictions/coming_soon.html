{% extends 'base.html' %}
{% load static %}

{% block title %}{{ title }} | BloBax{% endblock %}
{% block extra_css %}
<link href="{% static 'css/pages-enhanced.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<section class="bx-page bx-page-enhanced bx-pred-form-section">
  <div class="bx-page-bg" aria-hidden="true"></div>
  <div class="container position-relative">
    <div class="bx-coming-soon-hero bx-reveal">
      <p class="bx-eyebrow"><a href="{% url 'predictions:home' %}" class="text-decoration-none">← Predictions</a></p>
      <div class="icon-wrap"><i class="fas {{ icon }}"></i></div>
      <h1 class="bx-title h3">{{ title }}</h1>
      <p class="bx-muted-text">{{ description }}</p>
      <span class="bx-badge-upcoming mt-3 d-inline-block">UPCOMING MODEL</span>
      <div class="mt-4 d-flex gap-2 justify-content-center flex-wrap">
        <a href="{% url 'predictions:home' %}" class="bx-btn bx-btn-primary">View Live Models</a>
        <a href="{% url 'predictions:bmi' %}" class="bx-btn bx-btn-outline">Try BMI Calculator</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
